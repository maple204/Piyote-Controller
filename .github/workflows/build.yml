name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Piyote Controller
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build ARM64
        run: npm run build:arm64

      - name: Build x64
        run: npm run build:x64

      - name: Package as tarballs
        run: |
          cd dist
          tar -czf piyote-controller-linux-arm64.tar.gz piyote-controller-linux-arm64/
          tar -czf piyote-controller-linux-x64.tar.gz piyote-controller-linux-x64/
          ls -lh *.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/piyote-controller-linux-arm64.tar.gz
            dist/piyote-controller-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
