name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pi:
    name: Build ARM64 .deb for Raspberry Pi
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - show working directory contents
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== All files ==="
          ls -la
          echo "=== Lock files ==="
          ls -la package-lock.json yarn.lock npm-shrinkwrap.json 2>&1 || true
          echo "=== package.json scripts ==="
          cat package.json

      - name: Build ARM64 .deb
        run: npm run build:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
